<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pepixel News</title>
    <link rel="stylesheet" href="assets/styles/site.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: linear-gradient(135deg, #0a2f0a, #1a4d1a, #0f2a0f);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Press Start 2P", system-ui;
        image-rendering: pixelated;
        overflow: hidden;
        color: #aaffaa;
      }

      .monitor {
        width: 1180px;
        max-width: 95vw;
        background: #0f2a0f;
        border: 16px solid #1e3d1e;
        border-image: linear-gradient(#2e5f2e, #0f2a0f) 1;
        border-radius: 20px;
        padding: 25px 25px 70px 25px;
        box-shadow:
          0 0 80px rgba(0, 0, 0, 0.95),
          0 0 0 12px #1e3d1e,
          inset 0 0 40px rgba(0, 255, 80, 0.1);
        position: relative;
      }

      .screen {
        background: #0a1f0a;
        border: 12px solid #1e3d1e;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9);
        image-rendering: pixelated;
      }

      .monitor-header {
        background: #1e3d1e;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 8px solid #2e5f2e;
        font-size: 13px;
      }

      .logo {
        color: #00ff80;
        font-weight: 700;
        font-size: 18px;
        text-shadow: 3px 3px 0 #003300;
        letter-spacing: 2px;
      }

      .nav {
        flex: 1;
        display: flex;
        gap: 18px;
      }

      .nav a {
        color: #aaffaa;
        text-decoration: none;
        padding: 6px 12px;
        border: 3px solid #2e5f2e;
        background: #1e3d1e;
        transition: all 0.2s;
        font-size: 12px;
      }

      .nav a:hover {
        background: #00ff80;
        color: #002200;
        border-color: #00ff80;
      }

      .search-bar {
        background: #002200;
        border: 4px solid #2e5f2e;
        color: #aaffaa;
        padding: 8px 14px;
        font-family: "Press Start 2P";
        font-size: 12px;
        width: 220px;
      }

      .content {
        display: flex;
      }

      /* Vídeo */
      .video-container {
        flex: 1;
        position: relative;
        background: #000;
        padding-top: 56.25%;
        overflow: hidden;
        border-right: 8px solid #2e5f2e;
      }

      .video-container video,
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Painel de Preço */
      .price-panel {
        width: 340px;
        background: #1e3d1e;
        border-left: 8px solid #2e5f2e;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-size: 12px;
      }

      .price-header {
        text-align: center;
        color: #00ff80;
        font-size: 14px;
        text-shadow: 2px 2px 0 #003300;
      }

      .price {
        font-size: 26px;
        font-weight: bold;
        color: #00ff80;
        text-align: center;
        text-shadow: 3px 3px 0 #003300;
      }

      .change {
        text-align: center;
        font-size: 13px;
        padding: 4px 12px;
        border-radius: 4px;
      }

      .positive {
        background: #004400;
        color: #00ff80;
      }
      .negative {
        background: #440000;
        color: #ff6666;
      }

      /* Gráfico de Velas Pixelado */
      .candle-chart {
        height: 160px;
        background: #0a1f0a;
        border: 6px solid #2e5f2e;
        position: relative;
        overflow: hidden;
      }

      canvas {
        image-rendering: pixelated;
        width: 100%;
        height: 100%;
      }

      .buy-sell {
        display: flex;
        gap: 12px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        font-family: "Press Start 2P";
        font-size: 12px;
        text-align: center;
        border: 4px solid #2e5f2e;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-buy {
        background: #004400;
        color: #00ff80;
      }
      .btn-sell {
        background: #440000;
        color: #ff6666;
      }

      .btn:hover {
        transform: scale(1.05);
        border-color: #00ff80;
      }

      .monitor-base {
        width: 240px;
        height: 32px;
        background: #1e3d1e;
        margin: 35px auto 0;
        border: 8px solid #2e5f2e;
        border-radius: 6px;
        position: relative;
      }

      .monitor-base::after {
        content: "";
        position: absolute;
        width: 90px;
        height: 12px;
        background: #0a1f0a;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        border: 4px solid #2e5f2e;
      }
    </style>
  </head>
  <body id="top">
    <div class="monitor">
      <!-- Cabeçalho -->
      <div class="monitor-header">
        <div class="logo">PEPIXEL NEWS</div>

        <div class="nav">
          <a href="index.html">INÍCIO</a>
          <a href="pepixel-mine.html" target="_blank" rel="noopener noreferrer"
            >TEOLOGIA</a
          >
          <a href="pepixelcopa.html" target="_blank" rel="noopener noreferrer"
            >PEPIXEL COPA</a
          >
          <a href="pepixelcopa.html" target="_blank" rel="noopener noreferrer"
            >ESPORTES</a
          >
          <a
            href="https://x.com/pepixelpepixelg"
            target="_blank"
            rel="noopener noreferrer"
            style="
              background: #1e3d1e;
              color: #aaffaa;
              padding: 16px 32px;
              border: 6px solid #2e5f2e;
              text-decoration: none;
              font-size: 14px;
              display: flex;
              align-items: center;
              gap: 6px;
            "
          >
            COMUNIDADE X (𝕏)
          </a>
        </div>

        <input type="text" class="search-bar" placeholder="BUSCAR..." />
      </div>

      <!-- Conteúdo Principal -->
      <div class="content">
        <!-- Vídeo -->
        <div class="video-container">
          <video controls autoplay loop muted>
            <source src="PEPIXELPAINE.mp4" type="video/mp4" />
            Seu navegador não suporta vídeo.
          </video>
        </div>

        <!-- Painel PEPIXEL -->
        <div class="price-panel">
          <div class="price-header">PEPIXEL (PXL)</div>

          <div id="price" class="price">$0.004289</div>
          <div id="change" class="change positive">+14.8% (24h)</div>

          <!-- Gráfico de Velas Pixelado -->
          <div class="candle-chart">
            <canvas id="candleCanvas" width="300" height="160"></canvas>
          </div>

          <div style="text-align: center; font-size: 11px; color: #88cc88">
            Volume 24h: <span id="volume">1.47M</span> PXL
          </div>

          <div class="buy-sell">
            <div
              class="btn btn-buy"
              onclick="alert('Abrindo exchange → COMPRA de PEPIXEL 🟢')"
            >
              COMPRAR
            </div>
            <div
              class="btn btn-sell"
              onclick="alert('Abrindo exchange → VENDA de PEPIXEL 🔴')"
            >
              VENDER
            </div>
          </div>

          <div style="text-align: center; font-size: 10px; color: #66aa66">
            Dados em tempo real • PEPIXEL NEWS © 2026
          </div>
        </div>
      </div>

      <!-- Base -->
      <div class="monitor-base"></div>
    </div>

    <script>
      // Atualização de preço
      let price = 0.004289;
      const priceEl = document.getElementById("price");
      const changeEl = document.getElementById("change");
      const volumeEl = document.getElementById("volume");

      function updatePrice() {
        const variation = Math.random() * 0.0006 - 0.00025;
        price = Math.max(0.003, parseFloat((price + variation).toFixed(6)));

        priceEl.textContent = "$" + price.toFixed(6);

        const percent = (Math.random() * 12 + 5).toFixed(1);
        const positive = Math.random() > 0.35;

        changeEl.textContent = (positive ? "+" : "") + percent + "% (24h)";
        changeEl.className = "change " + (positive ? "positive" : "negative");

        volumeEl.textContent = (Math.random() * 900 + 1200).toFixed(0) + "K";
      }

      // Gráfico de Velas Pixelado
      const canvas = document.getElementById("candleCanvas");
      const ctx = canvas.getContext("2d");

      function drawCandlestick() {
        ctx.fillStyle = "#0a1f0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const data = [
          { o: 0.0041, h: 0.0044, l: 0.004, c: 0.0043 },
          { o: 0.0043, h: 0.0046, l: 0.0042, c: 0.0045 },
          { o: 0.0045, h: 0.0047, l: 0.0043, c: 0.0044 },
          { o: 0.0044, h: 0.0048, l: 0.0043, c: 0.0047 },
          { o: 0.0047, h: 0.005, l: 0.0046, c: 0.0049 },
          { o: 0.0049, h: 0.0051, l: 0.0047, c: 0.0048 },
          { o: 0.0048, h: 0.0052, l: 0.0047, c: 0.0051 },
        ];

        const w = canvas.width / data.length;
        const maxPrice = 0.0053;
        const minPrice = 0.0039;
        const range = maxPrice - minPrice;

        data.forEach((candle, i) => {
          const x = i * w + w * 0.3;
          const bodyTop = canvas.height * (1 - (candle.h - minPrice) / range);
          const bodyBottom =
            canvas.height * (1 - (candle.l - minPrice) / range);
          const openY = canvas.height * (1 - (candle.o - minPrice) / range);
          const closeY = canvas.height * (1 - (candle.c - minPrice) / range);

          // Wick
          ctx.strokeStyle = candle.c >= candle.o ? "#00ff80" : "#ff6666";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.moveTo(x + w / 2, bodyTop);
          ctx.lineTo(x + w / 2, bodyBottom);
          ctx.stroke();

          // Body
          const bodyHeight = Math.abs(closeY - openY);
          ctx.fillStyle = candle.c >= candle.o ? "#00ff80" : "#ff6666";
          ctx.fillRect(
            x,
            Math.min(openY, closeY),
            w * 0.4,
            Math.max(bodyHeight, 4),
          );
        });
      }

      // Atualizações
      setInterval(() => {
        updatePrice();
        drawCandlestick();
      }, 1800);

      // Inicialização
      updatePrice();
      drawCandlestick();
    </script>
  </body>
</html>
