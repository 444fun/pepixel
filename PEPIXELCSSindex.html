<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pepixel News</title>
    <link rel="stylesheet" href="assets/styles/site.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: linear-gradient(135deg, #0a2f0a, #1a4d1a, #0f2a0f);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Press Start 2P", system-ui;
        image-rendering: pixelated;
        overflow: hidden;
        color: #aaffaa;
      }

      .monitor {
        width: 1180px;
        max-width: 95vw;
        background: #0f2a0f;
        border: 16px solid #1e3d1e;
        border-image: linear-gradient(#2e5f2e, #0f2a0f) 1;
        border-radius: 20px;
        padding: 25px 25px 70px 25px;
        box-shadow:
          0 0 80px rgba(0, 0, 0, 0.95),
          0 0 0 12px #1e3d1e,
          inset 0 0 40px rgba(0, 255, 80, 0.1);
        position: relative;
      }

      .screen {
        background: #0a1f0a;
        border: 12px solid #1e3d1e;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.9);
        image-rendering: pixelated;
      }

      .monitor-header {
        background: #1e3d1e;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 8px solid #2e5f2e;
        font-size: 13px;
      }

      .logo {
        color: #00ff80;
        font-weight: 700;
        font-size: 18px;
        text-shadow: 3px 3px 0 #003300;
        letter-spacing: 2px;
      }

      .nav {
        flex: 1;
        display: flex;
        gap: 18px;
      }

      .nav a {
        color: #aaffaa;
        text-decoration: none;
        padding: 6px 12px;
        border: 3px solid #2e5f2e;
        background: #1e3d1e;
        transition: all 0.2s;
        font-size: 12px;
      }

      .nav a:hover {
        background: #00ff80;
        color: #002200;
        border-color: #00ff80;
      }

      .search-bar {
        background: #002200;
        border: 4px solid #2e5f2e;
        color: #aaffaa;
        padding: 8px 14px;
        font-family: "Press Start 2P";
        font-size: 12px;
        width: 220px;
      }

      .content {
        display: flex;
      }

      /* Vídeo */
      .video-container {
        flex: 1;
        position: relative;
        background: #000;
        padding-top: 56.25%;
        overflow: hidden;
        border-right: 8px solid #2e5f2e;
      }

      .video-container video,
      .video-container iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Painel de Preço */
      .price-panel {
        width: 340px;
        background: #1e3d1e;
        border-left: 8px solid #2e5f2e;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        font-size: 12px;
      }

      .price-header {
        text-align: center;
        color: #00ff80;
        font-size: 14px;
        text-shadow: 2px 2px 0 #003300;
      }

      .price {
        font-size: 26px;
        font-weight: bold;
        color: #00ff80;
        text-align: center;
        text-shadow: 3px 3px 0 #003300;
      }

      .change {
        text-align: center;
        font-size: 13px;
        padding: 4px 12px;
        border-radius: 4px;
      }

      .positive {
        background: #004400;
        color: #00ff80;
      }
      .negative {
        background: #440000;
        color: #ff6666;
      }

      /* Gráfico de Velas Pixelado */
      .candle-chart {
        height: 160px;
        background: #0a1f0a;
        border: 6px solid #2e5f2e;
        position: relative;
        overflow: hidden;
      }

      canvas {
        image-rendering: pixelated;
        width: 100%;
        height: 100%;
      }

      .buy-sell {
        display: flex;
        gap: 12px;
      }

      .btn {
        flex: 1;
        padding: 12px;
        font-family: "Press Start 2P";
        font-size: 12px;
        text-align: center;
        border: 4px solid #2e5f2e;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-buy {
        background: #004400;
        color: #00ff80;
      }
      .btn-sell {
        background: #440000;
        color: #ff6666;
      }

      .btn:hover {
        transform: scale(1.05);
        border-color: #00ff80;
      }

      .monitor-base {
        width: 240px;
        height: 32px;
        background: #1e3d1e;
        margin: 35px auto 0;
        border: 8px solid #2e5f2e;
        border-radius: 6px;
        position: relative;
      }

      .monitor-base::after {
        content: "";
        position: absolute;
        width: 90px;
        height: 12px;
        background: #0a1f0a;
        bottom: -28px;
        left: 50%;
        transform: translateX(-50%);
        border: 4px solid #2e5f2e;
      }
    </style>
  </head>
  <body id="top">

      <!-- Conteúdo Principal -->

        <!-- Painel PEPIXEL -->

      <!-- Base -->

    <script>
      // Real-time price + candles for Solana token contract
      const CONTRACT_ADDRESS = "DMsSyCX6PCLCNs1i4DeTrv9X9n9t42m5UMzDakX7pump";
      const priceEl = document.getElementById("price");
      const changeEl = document.getElementById("change");
      const volumeEl = document.getElementById("volume");
      const canvas = document.getElementById("candleCanvas");
      const ctx = canvas.getContext("2d");

      async function fetchAndRender() {
        // Attempt BirdEye first (preferred source)
        try {
          const beUrl = `https://birdeye.so/token/${CONTRACT_ADDRESS}?chain=solana`;
          const beRes = await fetch(beUrl);
          if (beRes.ok) {
            const html = await beRes.text();
            let m = html.match(/"price"\s*[:=]\s*"?([0-9]+(?:\.[0-9]+)?)"?/i);
            if (!m) m = html.match(/\$\s*([0-9]+(?:\.[0-9]+)?)/);
            if (m) {
              const p = Number(m[1]);
              if (!isNaN(p)) {
                priceEl.textContent = "$" + p.toFixed(6);
                changeEl.textContent = "(via BirdEye)";
                changeEl.className = "change";
                volumeEl.textContent = "-";
                return;
              }
            }
          }
        } catch (beErr) {
          console.warn("BirdEye fetch failed or CORS blocked", beErr);
        }

        try {
          const infoRes = await fetch(
            `https://api.coingecko.com/api/v3/coins/solana/contract/${CONTRACT_ADDRESS}`,
          );
          if (infoRes.ok) {
            const info = await infoRes.json();
            if (
              info.market_data &&
              info.market_data.current_price &&
              info.market_data.current_price.usd
            ) {
              priceEl.textContent =
                "$" + Number(info.market_data.current_price.usd).toFixed(6);
              const ch = info.market_data.price_change_percentage_24h;
              changeEl.textContent =
                (ch >= 0 ? "+" : "") + Number(ch).toFixed(2) + "% (24h)";
              changeEl.className =
                "change " + (ch >= 0 ? "positive" : "negative");
              volumeEl.textContent =
                info.market_data.total_volume &&
                info.market_data.total_volume.usd
                  ? Math.round(
                      info.market_data.total_volume.usd,
                    ).toLocaleString() + " USD"
                  : "-";
            }
            if (info.id) {
              const chartRes = await fetch(
                `https://api.coingecko.com/api/v3/coins/${info.id}/market_chart?vs_currency=usd&days=1`,
              );
              if (chartRes.ok) {
                const chart = await chartRes.json();
                const prices = chart.prices || [];
                const candles = buildCandlesFromPrices(prices, 24);
                drawCandles(candles);
                return;
              }
            }
          }
        } catch (e) {
          console.warn("CoinGecko contract lookup failed", e);
        }

        try {
          const simpleRes = await fetch(
            `https://api.coingecko.com/api/v3/simple/token_price/solana?contract_addresses=${CONTRACT_ADDRESS}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true`,
          );
          if (simpleRes.ok) {
            const json = await simpleRes.json();
            const key = Object.keys(json)[0];
            const data = json[key];
            if (data && data.usd) {
              priceEl.textContent = "$" + Number(data.usd).toFixed(6);
              const ch = data.usd_24h_change || 0;
              changeEl.textContent =
                (ch >= 0 ? "+" : "") + Number(ch).toFixed(2) + "% (24h)";
              changeEl.className =
                "change " + (ch >= 0 ? "positive" : "negative");
              volumeEl.textContent = data.usd_24h_vol
                ? Number(data.usd_24h_vol).toLocaleString() + " USD"
                : "-";
              drawSimulated();
              return;
            }
          }
        } catch (e) {
          console.warn("Simple price fetch failed", e);
        }

        drawSimulated();
      }

      function buildCandlesFromPrices(prices, targetCandles = 24) {
        if (!prices || prices.length === 0) return [];
        const bucketSize = Math.max(
          1,
          Math.floor(prices.length / targetCandles),
        );
        const candles = [];
        for (let i = 0; i < prices.length; i += bucketSize) {
          const chunk = prices.slice(i, i + bucketSize);
          const o = chunk[0][1];
          const c = chunk[chunk.length - 1][1];
          let h = -Infinity,
            l = Infinity;
          chunk.forEach((p) => {
            h = Math.max(h, p[1]);
            l = Math.min(l, p[1]);
          });
          candles.push({ o, h, l, c });
        }
        return candles.slice(-targetCandles);
      }

      function drawCandles(data) {
        if (!data || data.length === 0) return drawSimulated();
        ctx.fillStyle = "#0a1f0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const w = canvas.width / data.length;
        const values = data.flatMap((d) => [d.h, d.l]);
        const maxPrice = Math.max(...values);
        const minPrice = Math.min(...values);
        const range = Math.max(1e-8, maxPrice - minPrice);

        data.forEach((candle, i) => {
          const x = i * w + w * 0.2;
          const bodyTop = canvas.height * (1 - (candle.h - minPrice) / range);
          const bodyBottom =
            canvas.height * (1 - (candle.l - minPrice) / range);
          const openY = canvas.height * (1 - (candle.o - minPrice) / range);
          const closeY = canvas.height * (1 - (candle.c - minPrice) / range);

          ctx.strokeStyle = candle.c >= candle.o ? "#00ff80" : "#ff6666";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x + w / 2, bodyTop);
          ctx.lineTo(x + w / 2, bodyBottom);
          ctx.stroke();

          const bodyHeight = Math.max(2, Math.abs(closeY - openY));
          ctx.fillStyle = candle.c >= candle.o ? "#00ff80" : "#ff6666";
          ctx.fillRect(x, Math.min(openY, closeY), w * 0.6, bodyHeight);
        });
      }

      function drawSimulated() {
        const data = [
          { o: 0.0041, h: 0.0044, l: 0.004, c: 0.0043 },
          { o: 0.0043, h: 0.0046, l: 0.0042, c: 0.0045 },
          { o: 0.0045, h: 0.0047, l: 0.0043, c: 0.0044 },
          { o: 0.0044, h: 0.0048, l: 0.0043, c: 0.0047 },
          { o: 0.0047, h: 0.005, l: 0.0046, c: 0.0049 },
          { o: 0.0049, h: 0.0051, l: 0.0047, c: 0.0048 },
          { o: 0.0048, h: 0.0052, l: 0.0047, c: 0.0051 },
        ];
        drawCandles(data);
      }

      fetchAndRender();
      setInterval(fetchAndRender, 60000);
    </script>
  </body>
